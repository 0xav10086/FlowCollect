name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: '1.25.5'
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────
  # Job 1: 编译所有平台的 Sidecar 客户端二进制
  # ─────────────────────────────────────────────
  build-clients:
    name: Build Clients
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            suffix: windows_amd64.exe
          - goos: darwin
            goarch: amd64
            suffix: darwin_amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin_arm64
          - goos: linux
            goarch: amd64
            suffix: linux_amd64
          - goos: android
            goarch: arm64
            suffix: android_arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build client binary
        working-directory: ./client
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          OUTPUT_NAME="flow_collect_client_${{ matrix.suffix }}"
          go build -tags client -o "../${OUTPUT_NAME}" -ldflags="-s -w" .
          echo "Built: ${OUTPUT_NAME}"
          file "../${OUTPUT_NAME}" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.suffix }}
          path: flow_collect_client_${{ matrix.suffix }}
          retention-days: 1

  # ─────────────────────────────────────────────
  # Job 2: 构建 VPS 服务端资源包 (flow_collect.tgz)
  # ─────────────────────────────────────────────
  build-server-package:
    name: Build Server Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'smart_spend/package-lock.json'

      # ── 编译服务端 Go 二进制 ──
      - name: Build server binary
        working-directory: ./server
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -o "../flow_server_linux" -ldflags="-s -w" .
          echo "Built flow_server_linux"
          file "../flow_server_linux"

      # ── 构建 smart_spend 前端 ──
      - name: Install frontend dependencies
        working-directory: ./smart_spend
        run: npm ci

      - name: Build frontend
        working-directory: ./smart_spend
        run: npm run build

      # ── 下载 metacubexd 最新 Release 的 compressed-dist.tgz ──
      - name: Download metacubexd panel
        run: |
          mkdir -p metacubexd_dist
          # 获取最新 Release 的下载 URL
          DOWNLOAD_URL=$(curl -sL "https://api.github.com/repos/MetaCubeX/metacubexd/releases/latest" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for asset in data.get('assets', []):
              if asset['name'] == 'compressed-dist.tgz':
                  print(asset['browser_download_url'])
                  break
          ")
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "::error::Failed to find compressed-dist.tgz in metacubexd latest release"
            exit 1
          fi
          echo "Downloading metacubexd from: ${DOWNLOAD_URL}"
          curl -sL "$DOWNLOAD_URL" -o metacubexd_dist/compressed-dist.tgz
          tar xzf metacubexd_dist/compressed-dist.tgz -C metacubexd_dist/
          echo "metacubexd contents:"
          ls -la metacubexd_dist/

      # ── 组装目录结构 ──
      # 根目录/
      #   ├── flow_server_linux        (服务端可执行文件)
      #   └── web/                      (所有前端静态资源)
      #       ├── smart_spend 构建产物 (index.html, js/, css/ 等)
      #       ├── metacubexd 面板产物
      #       └── 其他静态资源 (yaml, csv 等)
      - name: Assemble server package
        run: |
          STAGING="flow_collect_staging"
          mkdir -p "${STAGING}/web"

          # 1. 服务端二进制
          cp flow_server_linux "${STAGING}/"
          chmod +x "${STAGING}/flow_server_linux"

          # 2. smart_spend 前端产物 → web/
          cp -r smart_spend/dist/* "${STAGING}/web/"

          # 3. metacubexd 面板产物 → web/node-panel/
          mkdir -p "${STAGING}/web/node-panel"
          # compressed-dist.tgz 解压后通常包含 dist/ 目录
          if [ -d "metacubexd_dist/dist" ]; then
            cp -r metacubexd_dist/dist/* "${STAGING}/web/node-panel/"
          else
            # 如果直接解压到当前目录
            cp -r metacubexd_dist/* "${STAGING}/web/node-panel/" 2>/dev/null || true
          fi

          # 4. 显示最终结构
          echo "=== Package structure ==="
          find "${STAGING}" -type f | head -50
          echo "========================="

          # 5. 打包
          tar czf flow_collect.tgz -C "${STAGING}" .
          echo "flow_collect.tgz size: $(du -h flow_collect.tgz | cut -f1)"

      - name: Upload server package
        uses: actions/upload-artifact@v4
        with:
          name: server-package
          path: flow_collect.tgz
          retention-days: 1

  # ─────────────────────────────────────────────
  # Job 3: 发布到 GitHub Releases
  # ─────────────────────────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-clients, build-server-package]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f | sort
          echo "============================"

      - name: Prepare release assets
        run: |
          mkdir -p release_assets
          # 复制所有客户端二进制
          find artifacts -name "flow_collect_client_*" -exec cp {} release_assets/ \;
          # 复制服务端包
          cp artifacts/server-package/flow_collect.tgz release_assets/
          echo "=== Release assets ==="
          ls -lh release_assets/
          echo "======================"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "FlowCollect ${{ github.ref_name }}"
          body: |
            ## FlowCollect ${{ github.ref_name }}

            ### Sidecar 客户端二进制
            | 文件 | 平台 |
            |------|------|
            | `flow_collect_client_windows_amd64.exe` | Windows x86_64 |
            | `flow_collect_client_darwin_amd64` | macOS Intel |
            | `flow_collect_client_darwin_arm64` | macOS Apple Silicon |
            | `flow_collect_client_linux_amd64` | Linux x86_64 / OpenWrt |
            | `flow_collect_client_android_arm64` | Android ARM64 |

            ### VPS 服务端资源包
            | 文件 | 说明 |
            |------|------|
            | `flow_collect.tgz` | 包含 `flow_server_linux` + `web/` 前端静态资源 |

            ### 部署说明
            ```bash
            # VPS 部署
            tar xzf flow_collect.tgz -C /opt/flow_collect/
            cd /opt/flow_collect && ./flow_server_linux
            ```
          files: |
            release_assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # Job 4: 构建并推送 Docker 镜像到 GHCR
  # ─────────────────────────────────────────────
  push-docker:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: [build-server-package]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/flow-collect-server:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/flow-collect-server:latest

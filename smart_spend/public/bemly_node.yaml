  - { name: '蓝莓自建 - 🇺🇸', type: hysteria2, server: 23.236.68.190, ports: 39849-50000, port: 39848, password: d08d2c79, sni: www.bing.com, skip-cert-verify: true }
  - { name: '蓝莓自建 - 🇯🇵', type: hysteria2, server: 154.36.181.145, ports: 50000-63491, port: 63492, password: ee7fba12, sni: www.bing.com, skip-cert-verify: true }
  - { name: '蓝莓自建 - 🇯🇵 - ipv6', type: hysteria2, server: "2a0f:1cc6:b120::2cf", ports: 50000-63491, port: 63492, password: ee7fba12, sni: www.bing.com, skip-cert-verify: true }
